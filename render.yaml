services:
  - type: web
    name: rescuenet-backend
    env: python
    buildCommand: pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: USE_FAKE_REDIS
        value: "true"
      - key: GROQ_API_KEY
        sync: false

  - type: web
    name: rescuenet-frontend
    env: python
    buildCommand: pip install -r frontend/requirements.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: API_BASE
        fromService:
          type: web
          name: rescuenet-backend
          envVarKey: RENDER_EXTERNAL_URL
